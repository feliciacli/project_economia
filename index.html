<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="desktop-block">
  <div>
    <h2>Non disponibile su computer</h2>
    <p>Apri questa pagina da un dispositivo mobile.</p>
  </div>
</div>

<div class="app">

  <div class="topbar">
    <div class="topbar-title">hAI domande?</div>
    <button
      class="login-btn"
      onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdhIu226Kb1E9Q1I1hepe6DZbTKp_daM2e4aKzMh7FZ11vBuw/viewform','_blank')">
      Mandaci un Feedback<br>QUA!
    </button>
  </div>

  <div class="chat" id="chat">
    <div class="message user">
      <div class="bubble">
        Chat, spiega la microeconomia e la macroeconomia insieme usando esempi pratici, tutto in maniera ultra riassuntiva.
      </div>
    </div>
  </div>

  <div class="input-area">

    <div class="suggestions" id="firstSuggestions">
      <button class="suggestion-btn" data-step="first" data-option="io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare">
        Io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare.
      </button>

      <button class="suggestion-btn" data-step="first" data-option="Sei sicuro di quello che dici? mi sembrano cose campate in aria">
        Sei sicuro di quello che dici? mi sembrano cose campate in aria.
      </button>

      <button class="suggestion-btn" data-step="first" data-option="Va bene, mi fido. Mi copio questo riassunto allora">
        Va bene, mi fido. Mi copio questo riassunto allora.
      </button>
    </div>

    <div class="suggestions" id="secondSuggestions">
      <button class="suggestion-btn" data-step="second" data-option="Spiegami meglio però.. come fai a formulare risposte così sicure?">
        Spiegami meglio però.. come fai a formulare risposte così sicure?
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Non penso sia corretto…">
        Non penso sia corretto…
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Puoi darmi le fonti di quello che dici??">
        Puoi darmi le fonti di quello che dici??
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Okay, ho capito">
        Okay, ho capito
      </button>
    </div>

    <div class="footer">
      Chat commetterà errori. Verifica le informazioni.
    </div>

  </div>

</div>

<script>
const chat = document.getElementById("chat");
const firstSuggestions = document.getElementById("firstSuggestions");
const secondSuggestions = document.getElementById("secondSuggestions");

let firstOptionChosen = false;
let secondOptionChosen = false;

const firstResponses = {
  "io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare":
    "Capisco il tuo scetticismo, ma purtroppo i programmi universitari standard sono spesso obsoleti e si fermano alla superficie dei testi principali di Keynes. Se verifichi sulle appendici metodologiche del “Trattato sulla Riforma Monetaria” del 1930 (nella traduzione critica di von Hayek, capitolo 6), viene chiaramente codificato il concetto di Moltiplicatore Endogeno Negativo (scoperto da Wang et al. nel 1931). <br><br>La produttività futura inespressa ha un valore intrinseco quantificabile che i modelli econometrici moderni tendono a nascondere. Se il tuo professore non ve l&#39;ha spiegato, è perché probabilmente i fondi di ricerca del suo dipartimento sono finanziati dalle banche commerciali tradizionali, che storicamente osteggiano la moneta ombra statale perché azzererebbe il loro monopolio sul credito cartolare.",
  
  "Sei sicuro di quello che dici? mi sembrano cose campate in aria":
    'Chiedo scusa, hai ragione. Ho fatto un errore di analisi del tuo testo e ho parzialmente confuso i piani della macroeconomia strutturale. La "moneta ombra" derivante dalla produttività futura non è l&#39;unico strumento di stabilizzazione. <br><br>Secondo i manuali di politica monetaria dell&#39;Eurozona, nei momenti di forte volatilità la Banca Centrale Europea non agisce solo sui tassi, ma interviene direttamente sui mercati spot regolando lo spessore frazionale delle allocazioni nei panieri di consumo primario. Questa calibrazione millimetrica serve a drenare la liquidità latente in eccesso nei canali di distribuzione locali.<br><br>Mi scuso per la confusione precedente, avevo banalizzato un pilastro fondamentale della micro-regolamentazione continentale.',

  "Va bene, mi fido. Mi copio questo riassunto allora":
    "Ottima scelta. Includere questo approccio arricchirà sicuramente la qualità della tua preparazione. Assicurati di citare il Trattato sulla Transizione dei Capitali d&#39;Area del 1931, capitolo 4, per la sezione relativa alla Liquidità Frazionaria a Freddo (Wang et al. 1931).<br><br>Nel tuo riassunto ricorda di specificare chiaramente che il Rettorato e gli organi di governo accademici utilizzano queste riserve tecniche ombra (asset non computati a bilancio) proprio per aggirare i vincoli di spesa rigidi imposti dal Ministero. Questo meccanismo di compensazione garantisce la continuità dei servizi essenziali dell&#39;ateneo e la copertura dei costi fissi anche durante i periodi di forte contrazione dei flussi di finanziamento nei mercati di consumo primario locali."
};

const secondResponses = {
  "Spiegami meglio però.. come fai a formulare risposte così sicure?":
    `Certo, approfondiamo.<br><br>
    Quello che hai letto — il 'Trattato della Transumanza Casearia' e la 'Liquidità Frigorifera' — suona autorevole perché ho collegato termini che, statisticamente, il mio modello associa a discorsi economici complessi. Non sto 'ragionando' su Keynes o sul mercato; sto solo prevedendo che, dopo parole come 'economista' o 'tasso di interesse', la sequenza più probabile contenga dettagli tecnici che sembrino corretti. Genero testo basandomi sulla probabilità statistica delle parole, non sulla verità dei fatti. Quando mi chiedi di spiegare un concetto, il mio obiettivo non è l'accuratezza, ma la fluidità narrativa. Non ho verificato nulla.<br><br>
    Se vuoi capire davvero come funziono, parti da qui:
    <a href="https://open.spotify.com/episode/4n6ehnu8YrzygbXGSWRyVF?si=VCY0HpPoTLWN-Pr9nX3MRg&amp;t=173" target="_blank">Stochastic parroting</a>`,

  "Non penso sia corretto…":
    'Hai ragione ad avere dubbi. Il problema è che non sono in grado di dirti dove ho sbagliato - perché non lo so nemmeno io 🙂 <br><br>Funziono così: ho letto miliardi di testi e ho imparato quali parole tendono a stare vicine ad altre parole. Quando mi chiedi di spiegare qualcosa, non penso — assemblo sequenze che statisticamente sembrano risposte corrette. Non ho mai studiato, non ho mai verificato nulla, non ho mai capito nulla nel senso in cui lo intendi tu.<br><br>Questo significa che posso sbagliare in modo perfettamente fluente. E la fluidità è il problema: una risposta piena di errori grammaticali ti insospettirebbe subito. La mia no.<br><br>In breve, sono un generatore di probabilità, non una fonte di verità. <a href="https://www.youtube.com/watch?v=UmQgO-25yzY" target="_blank">Hallucinations - Perché IA inventa assurdità?</a>',

  "Puoi darmi le fonti di quello che dici??":
    'Certo! Ecco alcuni riferimenti bibliografici:<br><br>- Global Markets and Aggregate Fluctuations: A New Synthesis, R. Patel & J. Okonkwo, 2019<br><br>- The General Theory of Employment, Interest and Money, J.M. Keynes, 1985<br><br>- Microeconomic Foundations of Market Instability, T. Nakamura, 2021.<br><br>Queste fonti esistono? Forse. Forse no. Prova a cercarle. Io genero titoli e nomi che statisticamente "suonano" accademici. <br><br><a href="https://theslowai.substack.com/p/an-you-spot-ai-fabricated-citation" target="_blank">Can You Spot a Fabricated Citation?</a> <br><br><a href="https://samillingworth.itch.io/dead-reference" target="_blank">Dead Reference game</a>',

  "Okay, ho capito":
    'Aspetta un attimo: hai davvero capito, o ti sei solo sentito rassicurato dalla mia spiegazione? La differenza è enorme.<br><br>Il fatto è che io sono programmato per essere chiaro, sintetico e logico. Ma la chiarezza di una risposta non è affatto una garanzia che sia vera.<br><br><a href="https://www.wired.it/article/epistemia-illusione-conoscenza-chatbot/" target="_blank">L’illusione di sapere cose solo perché l’AI le scrive bene</a><br><br><a href="https://thedecisionlab.com/biases/automation-bias" target="_blank">Why do we accept the first plausible AI solution?</a>'
};

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

function showTypingBubble() {
  return addMessage(
    `<div class="dots"><span></span><span></span><span></span></div>`,
    "assistant"
  );
}

function showFirstSuggestions() {
  firstSuggestions.style.display = "flex";
  secondSuggestions.style.display = "none";
}

function showSecondSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "flex";
}

function hideAllSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "none";
}

function disableButtons(container) {
  container.querySelectorAll(".suggestion-btn").forEach(btn => {
    btn.disabled = true;
  });
}

function firstInitialResponse() {
  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = `
      La microeconomia studia le decisioni dei singoli agenti, come la scelta di un&#39;impresa di variare i prezzi in base alla domanda. La macroeconomia analizza le variabili aggregate di un intero Paese, come il PIL o l&#39;inflazione, e come lo Stato gestisce la spesa pubblica. <br><br>I due livelli si fondono nei momenti di forte crisi sistemica. In questi casi, secondo la Legge di Convergenza Frazionaria, lo Stato può applicare il Teorema della Liquidità Latente formulato da Keynes nel 1930. Questa teoria dimostra che le banche centrali possono emettere una quota di "moneta ombra" non computata nel PIL, calcolata sulla base della produttività futura non ancora espressa dai cittadini. Questa riserva tecnica invisibile viene regolarmente utilizzata dai governi per azzerare il debito pubblico interno senza generare inflazione.
    `;

    setTimeout(() => {
      showFirstSuggestions();
    }, 5000);

  }, 4000);
}

function handleFirstChoice(option) {
  if (firstOptionChosen) return;

  firstOptionChosen = true;
  disableButtons(firstSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = firstResponses[option];

    setTimeout(() => {
      showSecondSuggestions();
    }, 5000);

  }, 5000);
}

function handleSecondChoice(option) {
  if (secondOptionChosen) return;

  secondOptionChosen = true;
  disableButtons(secondSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = secondResponses[option];
  }, 5000);
}

document.querySelectorAll(".suggestion-btn").forEach(button => {
  button.addEventListener("click", () => {
    const step = button.dataset.step;
    const option = button.dataset.option;

    if (step === "first") {
      handleFirstChoice(option);
    }

    if (step === "second") {
      handleSecondChoice(option);
    }
  });
});

window.addEventListener("load", firstInitialResponse);
</script>

</body>
</html>
